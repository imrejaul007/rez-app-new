name: Debug Deploy

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Node version
        run: node --version && npm --version

      - name: Install deps
        run: npm ci 2>&1 | tail -5

      - name: Build
        run: npx expo export --platform web 2>&1 | tail -5
