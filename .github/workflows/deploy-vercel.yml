name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview

concurrency:
  group: consumer-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Consumer App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and build
        run: npm ci && npm run build:render

      - name: Deploy to Vercel
        if: github.event.inputs.environment != 'preview'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ vars.VERCEL_CONSUMER_PROJECT_ID }}
          vercel-args: '--prod=true'
        continue-on-error: true

      - name: Deploy preview
        if: github.event.inputs.environment == 'preview'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ vars.VERCEL_CONSUMER_PROJECT_ID }}
          vercel-args: '--prod=false'
        continue-on-error: true
