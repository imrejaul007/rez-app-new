name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Clear corrupted npm cache and reinstall
        run: |
          rm -rf ~/.npm/_cacache
          npm ci || npm ci --force

      - name: Reinstall known-corrupted packages
        run: |
          # Delete corrupted packages and reinstall from registry
          rm -rf node_modules/source-map
          rm -rf node_modules/hermes-parser
          rm -rf node_modules/@expo/vector-icons
          rm -rf node_modules/@expo/metro-runtime
          npm install source-map@0.6.1 hermes-parser@0.35.0 @expo/vector-icons @expo/metro-runtime --force

      - name: Lint
        run: npm run lint

      - name: QR Parser Sync Check
        run: npm run verify:qr-sync

      - name: Run tests
        run: npm test

      - name: Build web export
        run: npx expo export

  deploy:
    name: Trigger Vercel Deploy
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Vercel deployment via webhook
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            --fail \
            --show-error
