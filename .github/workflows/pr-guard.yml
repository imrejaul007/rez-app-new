name: PR Guardrail

on:
  push:
    branches: [main, production, master]

jobs:
  pr-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check if push came from a PR
        run: |
          # Get the commit message and compare push to pull_request event
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          COMMIT_AUTHOR="${{ github.event.head_commit.author.username }}"
          EVENT="${{ github.event_name }}"
          
          echo "Push event: $EVENT"
          echo "Author: $COMMIT_AUTHOR"
          echo "Commit: ${COMMIT_MSG:0:80}"
          
          # If this is a direct push (not from a PR), fail loudly
          if [ "$EVENT" = "push" ]; then
            echo ""
            echo "=========================================="
            echo "  WARNING: Direct push to protected branch"
            echo ""
            echo "  Use this workflow instead:"
            echo "  1. git checkout -b feature/my-feature"
            echo "  2. git commit your changes"
            echo "  3. git push origin HEAD"
            echo "  4. Open PR on GitHub → Review → Merge"
            echo ""
            echo "  If this was intentional, use --no-verify to bypass:"
            echo "  git push --no-verify origin HEAD"
            echo ""
            echo "  But please — use PRs. They prevent divergence."
            echo "=========================================="
            echo "::warning::Direct push detected. Please use PR workflow for better code quality."
          fi
